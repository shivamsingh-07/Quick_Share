// UKEY2 wire schema (subset).
// Reference: https://github.com/google/ukey2
syntax = "proto2";

package quickshare.ukey;

option java_package = "com.quickshare.tv.proto.ukey";
option java_multiple_files = true;

// Top-level wrapper: every UKEY2 message on the wire is a Ukey2Message.
message Ukey2Message {
    enum Type {
        UNKNOWN_DO_NOT_USE = 0;
        ALERT = 1;
        CLIENT_INIT = 2;
        SERVER_INIT = 3;
        CLIENT_FINISHED = 4;
    }
    optional Type message_type = 1;
    optional bytes message_data = 2; // The serialized inner message.
}

message Ukey2Alert {
    enum AlertType {
        BAD_MESSAGE = 1;
        BAD_MESSAGE_STRUCTURE = 2;
        INCORRECT_MESSAGE = 3;
        BAD_MESSAGE_DATA = 4;
        BAD_VERSION = 100;
        BAD_RANDOM = 101;
        BAD_HANDSHAKE_CIPHER = 102;
        BAD_NEXT_PROTOCOL = 103;
        BAD_PUBLIC_KEY = 104;
        INTERNAL_ERROR = 200;
    }
    optional AlertType type = 1;
    optional string error_message = 2;
}

enum Ukey2HandshakeCipher {
    RESERVED = 0;
    P256_SHA512 = 100;
    CURVE25519_SHA512 = 200;
}

message Ukey2ClientInit {
    optional int32 version = 1;
    optional bytes random = 2; // 32 bytes
    message CipherCommitment {
        optional Ukey2HandshakeCipher handshake_cipher = 1;
        optional bytes commitment = 2; // SHA-512(Ukey2Message containing ClientFinished)
    }
    repeated CipherCommitment cipher_commitments = 3;
    optional string next_protocol = 4;
}

message Ukey2ServerInit {
    optional int32 version = 1;
    optional bytes random = 2; // 32 bytes
    optional Ukey2HandshakeCipher handshake_cipher = 3;
    optional bytes public_key = 4; // GenericPublicKey serialized
}

message Ukey2ClientFinished {
    optional bytes public_key = 1; // GenericPublicKey serialized
}

// Generic key envelope used inside ServerInit / ClientFinished.
enum PublicKeyType {
    UNKNOWN_PUBLIC_KEY_TYPE = 0;
    EC_P256 = 1;
    RSA2048 = 2;
    DH2048_MODP = 3;
}

message GenericPublicKey {
    optional PublicKeyType type = 1;
    optional EcP256PublicKey ec_p256_public_key = 2;
}

message EcP256PublicKey {
    // Big-endian, with a leading sign byte if MSB of |x|/|y| is set.
    required bytes x = 1;
    required bytes y = 2;
}
